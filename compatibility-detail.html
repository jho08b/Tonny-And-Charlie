    <script>

        const compatibilityData = {

            ENFP: {

                animal:"수달",

                image:"images/mbti_img/ENFP_수달.png",

                best:
                "💖 INTJ 스라소니\n\n전략적인 스라소니는 자유로운 수달의 아이디어를 현실적으로 정리해 줄 수 있습니다. 서로 부족한 부분을 보완하는 최고의 궁합입니다.",

                good:
                "😊 ENTJ 반달가슴곰\n\n반달가슴곰의 추진력과 수달의 창의성이 만나 좋은 시너지를 만들어냅니다.",

                bad:
                "⚡ ESTP 담비\n\n둘 다 활동적이고 즉흥적인 성향이 강해 주도권 경쟁이 발생할 수 있습니다."

            }

        };

        const params = new URLSearchParams(window.location.search);

        const type = params.get("type");

            if(compatibilityData[type]){

                document.getElementById("title").innerText = type + " · " + compatibilityData[type].animal;

                document.getElementById("animalImage").src = compatibilityData[type].image;

                document.getElementById("bestMatch").innerText = compatibilityData[type].best;

                document.getElementById("goodMatch").innerText = compatibilityData[type].good;

                document.getElementById("badMatch").innerText = compatibilityData[type].bad;

            }

            else{

                document.getElementById("title").innerText = "준비중인 궁합입니다.";

            }

    </script>
