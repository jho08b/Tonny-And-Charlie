            {

                typeA: "F",

            },
      
            {
                text: "Q16. 현장 조사 일정이 잡혔습니다.",
                A: "시간표와 준비물을 미리 정리해 계획대로 움직인다",
                B: "현장 상황에 맞게 유연하게 움직이는 편이 좋다",
                typeA: "J",
                typeB: "P",
                img: "assets/images/quiz/q16.png"
            },
      
            {
                text: "Q17. 조사 중 예상하지 못한 생물 흔적을 발견했습니다.",
                A: "원래 계획을 크게 벗어나지 않는 선에서 기록한다",
                B: "흥미로운 단서라면 계획을 바꿔 더 조사해본다",
                typeA: "J",
                typeB: "P",
                img: "assets/images/quiz/q17.png"
            },
      
            {
                text: "Q18. 보호 활동 프로젝트를 맡게 되었습니다.",
                A: "목표, 일정, 역할을 먼저 확실히 정한다",
                B: "진행하면서 필요한 내용을 그때그때 조정한다",
                typeA: "J",
                typeB: "P",
                img: "assets/images/quiz/q18.png"
            },
      
            {
                text: "Q19. 멸종위기 야생생물 연구 노트를 작성하는 방식은?",
                A: "날짜, 장소, 관찰 내용을 정해진 형식에 맞춰 정리한다",
                B: "떠오르는 생각과 관찰 내용을 자유롭게 적는다",
                typeA: "J",
                typeB: "P",
                img: "assets/images/quiz/q19.png"
            },
           
            {
             text: "Q20. 마지막 보고서를 제출해야 합니다.",
                A: "제출기한 일주일 전에 완성해두고 여러 번 검토한다",
                B: "마감 전까지 더 좋은 내용이 있으면 계속 추가하고 마감 직전에 제출한다",
                typeA: "J",
                typeB: "P",
                img: "assets/images/quiz/q20.png"
            }
        ];

        let currentQuestion = 0;

        let score = {

            E:0,
            I:0,

            N:0,
            S:0,

            F:0,
            T:0,

            J:0,
            P:0
        };

        let selectedAnswers = [];

        showQuestion();

        function showQuestion(){

        const q = questions[currentQuestion];

            document.getElementById( "questionText" ).innerText = q.text;

            document.getElementById( "answerA" ).innerText = "A. " + q.A;

            document.getElementById( "answerB" ).innerText = "B. " + q.B;

            document.getElementById( "questionImage" ).src = q.img;

            document.getElementById( "questionNumber" ).innerText = (currentQuestion + 1) + " / " + questions.length;

            let percent = ((currentQuestion + 1) / questions.length) * 100;

            document.getElementById( "progressBar" ).style.width = percent + "%";
        }

        function selectAnswer(choice){

            const q = questions[currentQuestion];

            selectedAnswers[currentQuestion] = choice;

            if(choice === "A"){
                score[q.typeA]++;
            } else{
                score[q.typeB]++;
            }

            currentQuestion++;

            if( currentQuestion < questions.length ){
                showQuestion();
            }
            else{
                showResult();
            }
        }

        document.getElementById("answerA").addEventListener("click", () => selectAnswer("A"));

        document.getElementById("answerB").addEventListener("click", () => selectAnswer("B"));

        function goPrev(){

            if(currentQuestion <= 0){
                return;
            }

            currentQuestion--;

            showQuestion();
        }

        function showResult(){

            let finalType = "";

            finalType += score.E >= score.I ? "E" : "I";

            finalType += score.N >= score.S ? "N" : "S";

            finalType += score.F >= score.T ? "F" : "T";

            finalType += score.J >= score.P ? "J" : "P";

            localStorage.setItem( "animalType", finalType );

            location.href = "result.html?type=" + finalType;
        }

        function restartQuiz(){

            if(!confirm("처음부터 다시 시작할까요?")){
                return;
            }

            currentQuestion = 0;

            score = {
                E:0,I:0,
                N:0,S:0,
                F:0,T:0,
                J:0,P:0
            };

            selectedAnswers = [];

            showQuestion();
        }

    </script>
