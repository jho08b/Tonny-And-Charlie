<section id="main">

    <div class="container">

        <article class="box post">

            <header style="text-align:center;">
                <h2>후원 신청</h2>
                <p>여러분의 관심이 멸종위기 동물을 지킵니다.</p>
            </header>

            <form id="donateForm">

                <label>이름</label>
                <input type="text" id="name" required>

                <br><br>

                <label>이메일</label>
                <input type="email" id="email" required>

                <br><br>

                <label>연락처</label>
                <input type="tel" id="phone">

                <br><br>

                <label>후원 유형</label>

                <br>

                <input type="radio" name="type" value="일시후원" checked>
                일시후원

                <input type="radio" name="type" value="정기후원">
                정기후원

                <br><br>

                <label>후원 금액</label>

                <select id="amount">

                    <option value="10000">
                        10,000원
                    </option>

                    <option value="30000">
                        30,000원
                    </option>

                    <option value="50000">
                        50,000원
                    </option>

                    <option value="100000">
                        100,000원
                    </option>

                </select>

                <br><br>

                <label>응원 메시지</label>

                <textarea id="message"></textarea>

                <br><br>

                <div style="text-align:center;">

                    <button type="submit"
                            class="button large">

                        후원하기

                    </button>

                </div>

            </form>

        </article>

    </div>

</section>


</div>

<script>

document.getElementById("donateForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const donor = {

        name:
        document.getElementById("name").value,

        amount:
        document.getElementById("amount").value

    };

    localStorage.setItem(
        "donor",
        JSON.stringify(donor)
    );

    location.href =
    "donate-success.html";

});

</script>

<script src="assets/js/jquery.min.js"></script>
